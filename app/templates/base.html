<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Vestas Love PDF{% endblock %}</title>
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    
    <!-- Custom CSS -->
    <link href="{{ url_for('static', filename='css/variables.css') }}" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/base.css') }}" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/components.css') }}" rel="stylesheet">
    
    {% block extra_css %}{% endblock %}
    
    <style>
        {% block inline_css %}{% endblock %}
    </style>
</head>
<body class="{% block body_class %}{% endblock %}">
    
    {% block header %}{% endblock %}
    
    <div class="{% block container_class %}container{% endblock %}" style="padding: 20px;">
        {% block back_link %}
        <a href="/" class="back-link">
            <i class="bi bi-arrow-left"></i> Voltar ao início
        </a>
        {% endblock %}
        
        {% block content %}{% endblock %}
    </div>
    
    {% block footer %}{% endblock %}
    
    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- Custom JS -->
    <script src="{{ url_for('static', filename='js/utils.js') }}"></script>
    <script src="{{ url_for('static', filename='js/api.js') }}"></script>
    <script src="{{ url_for('static', filename='js/idle-monitor.js') }}"></script>
    
    {% block extra_js %}{% endblock %}
    
    <script>
        {% block inline_js %}{% endblock %}
    </script>
</body>
</html>
